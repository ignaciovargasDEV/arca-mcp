services:
  postgres-main:
    image: postgres:16-alpine
    container_name: postgres-main
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arca_mcp}
      POSTGRES_USER: ${POSTGRES_USER:-arca_mcp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_main_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - backend
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  arca-mcp:
    build: .
    container_name: arca-mcp
    restart: unless-stopped
    depends_on:
      postgres-main:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-arca_mcp_user}:${POSTGRES_PASSWORD}@postgres-main:5432/${POSTGRES_DB:-arca_mcp}
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
    volumes:
      - ./certs:/certs:ro
    networks:
      - backend
    ports:
      - "127.0.0.1:8000:8000"

networks:
  backend:
    name: backend

volumes:
  postgres_main_data:
    name: postgres_main_data
